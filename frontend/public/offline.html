<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <title>Lex-Doc Sorter offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Geist, Satoshi, -apple-system, BlinkMacSystemFont, "Segoe UI",
          system-ui, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #f6f9ff;
        color: #0f172a;
      }

      main {
        width: min(420px, calc(100vw - 32px));
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 24px 80px -48px rgba(15, 23, 42, 0.55);
        padding: 24px;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        letter-spacing: -0.02em;
      }

      p {
        margin: 12px 0 0;
        color: #475569;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        margin-top: 18px;
        border-radius: 10px;
        background: #2563eb;
        color: white;
        padding: 10px 14px;
        text-decoration: none;
        font-weight: 600;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #050a14;
          color: #e2e8f0;
        }

        main {
          border-color: rgba(71, 85, 105, 0.55);
          background: rgba(15, 23, 42, 0.82);
        }

        p {
          color: #94a3b8;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Нет соединения</h1>
      <p>
        Lex-Doc Sorter уже установлен как приложение, но для загрузки и
        обработки документов нужен доступ к интернету.
      </p>
      <a href="/">Открыть снова</a>
    </main>
  </body>
</html>
