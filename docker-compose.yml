name: lex-doc-sorter

services:
  postgres:
    image: postgres:15-alpine
    container_name: lex-doc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lexdoc}
      POSTGRES_USER: ${POSTGRES_USER:-lexdoc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lexdoc_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lexdoc} -d ${POSTGRES_DB:-lexdoc}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lex-doc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
    container_name: lex-doc-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lexdoc}:${POSTGRES_PASSWORD:-lexdoc_secret}@postgres:5432/${POSTGRES_DB:-lexdoc}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      NODE_ENV: ${NODE_ENV:-development}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      PORT: 3001
      OTP_DEV_MODE: ${OTP_DEV_MODE:-true}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OCR_ENABLED: ${OCR_ENABLED:-true}
      OCR_LANGUAGES: ${OCR_LANGUAGES:-rus+eng}
      OCR_MAX_PDF_PAGES: ${OCR_MAX_PDF_PAGES:-3}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_SUBJECT: ${EMAIL_SUBJECT:-}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_PATH: /app/uploads
      S3_ENDPOINT: ${S3_ENDPOINT:-https://s3.twcstorage.ru}
      S3_REGION: ${S3_REGION:-ru-1}
      S3_BUCKET: ${S3_BUCKET:-lex-doc-files}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
    ports:
      - "3001:3001"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,backend}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
    container_name: lex-doc-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
