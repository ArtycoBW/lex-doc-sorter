name: lex-doc-sorter

services:
  postgres:
    image: postgres:15-alpine
    container_name: lex-doc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lexdoc}
      POSTGRES_USER: ${POSTGRES_USER:-lexdoc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lexdoc_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lexdoc} -d ${POSTGRES_DB:-lexdoc}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lex-doc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
    container_name: lex-doc-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lexdoc}:${POSTGRES_PASSWORD:-lexdoc_secret}@postgres:5432/${POSTGRES_DB:-lexdoc}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      PORT: 3001
      OTP_DEV_MODE: "true"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      STORAGE_PATH: /app/uploads
    ports:
      - "3001:3001"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,backend}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
    container_name: lex-doc-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
